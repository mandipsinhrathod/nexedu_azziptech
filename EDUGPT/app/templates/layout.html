<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGPT - Master Skills with AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- Header Section -->
    <header class="header-section" style="padding-top: 92px;">
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                    <div class="bg-white rounded px-3 py-2 d-flex align-items-center justify-content-center shadow"
                        style="box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4) !important;">
                        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="EduGPT Logo" height="45"
                            style="object-fit: contain; filter: drop-shadow(0px 0px 1px rgba(0,0,0,0.1));">
                    </div>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-center">
                        <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}"
                                href="/">Home</a></li>
                        <li class="nav-item"><a class="nav-link {% if '/about' in request.path %}active{% endif %}"
                                href="/about">About us</a></li>
                        <li class="nav-item"><a class="nav-link {% if '/courses' in request.path %}active{% endif %}"
                                href="/courses">Courses</a></li>
                        <li class="nav-item"><a class="nav-link {% if '/news' in request.path %}active{% endif %}"
                                href="/news">News</a></li>
                        <li class="nav-item"><a class="nav-link {% if '/contact' in request.path %}active{% endif %}"
                                href="/contact">Contact</a></li>

                        {% if session.get('user_id') %}
                        <li class="nav-item dropdown ms-3">
                            <a class="nav-link dropdown-toggle btn-user-profile" href="#" id="userDropdown"
                                role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <span>Hello, {{ session.get('username') }}</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3"
                                aria-labelledby="userDropdown">
                                <li><a class="dropdown-item py-2" href="/dashboard">Dashboard</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item text-danger py-2" href="/logout">Logout</a></li>
                            </ul>
                        </li>
                        {% else %}
                        <li class="nav-item">
                            <a href="/login" class="btn btn-login shadow-lg">Login</a>
                        </li>
                        {% endif %}
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
