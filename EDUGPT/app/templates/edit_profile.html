{% extends "layout.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="expert-card p-5 shadow-lg">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold mb-0">Edit Profile</h3>
                    <a href="{{ url_for('dashboard') }}"
                        class="btn btn-outline-secondary btn-sm rounded-pill">Cancel</a>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-bold">Username</label>
                        <input type="text" class="form-control" id="username" name="username"
                            value="{{ user.username }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}"
                            required>
                    </div>

                    <div class="mb-4">
                        <label for="bio" class="form-label fw-bold">Bio <small class="text-muted fw-normal">(Tell us
                                about yourself)</small></label>
                        <textarea class="form-control" id="bio" name="bio" rows="4"
                            placeholder="I am a passionate learner...">{{ user.bio if user.bio else '' }}</textarea>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary-custom btn-lg rounded-pill shadow">Save
                            Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
